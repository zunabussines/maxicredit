<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solicitá tu Crédito — MaxiCredit</title>
  <meta name="description" content="Completá el formulario y solicitá tu crédito personal. Respuesta rápida. CABA y GBA.">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div data-header></div>

  <section class="page-head"><div class="container">
    <h1>Completá y te <span class="red">contactamos</span></h1>
    <p>Cargá tus datos. Es rápido y sin compromiso. Te respondemos a la brevedad.</p>
  </div></section>

  <section class="section"><div class="container" style="max-width:820px">
    <form id="credit-form" class="form-card" novalidate>
      <!-- honeypot anti-spam -->
      <input type="checkbox" name="botcheck" style="display:none" tabindex="-1" autocomplete="off">

      <div class="form-wrap">
        <div class="field"><label>Nombre y apellido</label><input name="nombre" type="text" required><span class="err"></span></div>
        <div class="field"><label>DNI</label><input name="dni" type="text" inputmode="numeric" required><span class="err"></span></div>
        <div class="field"><label>Fecha de nacimiento</label><input name="nacimiento" type="date" required><span class="err"></span></div>
        <div class="field"><label>Email</label><input name="email" type="email" required><span class="err"></span></div>
        <div class="field"><label>Teléfono / WhatsApp</label><input name="telefono" type="tel" required><span class="err"></span></div>
        <div class="field"><label>Zona</label>
          <select name="zona" required>
            <option value="">Elegí…</option>
            <option>CABA</option><option>GBA Norte</option><option>GBA Oeste</option><option>GBA Sur</option>
          </select><span class="err"></span></div>
        <div class="field full"><label>Domicilio</label><input name="domicilio" type="text" required><span class="err"></span></div>
        <div class="field"><label>Situación laboral</label>
          <select name="laboral" required>
            <option value="">Elegí…</option>
            <option>Solo DNI</option>
            <option>Recibo de sueldo</option>
            <option>Empleado doméstico</option>
            <option>Pensionado/Jubilado</option>
            <option>Monotributista</option>
            <option>Autónomo</option>
            <option>Otro</option>
          </select><span class="err"></span></div>
        <div class="field"><label>Monto solicitado</label><input name="monto" type="number" min="0" required><span class="err"></span></div>
        <div class="field"><label>Cantidad de cuotas</label>
          <select name="cuotas" required>
            <option value="">Elegí…</option>
            <option>3</option><option>6</option><option>9</option><option>12</option><option>18</option><option>24</option>
          </select><span class="err"></span></div>
        <div class="field full"><label>Mensaje (opcional)</label><textarea name="mensaje" rows="3"></textarea></div>
        <div class="field full">
          <label class="check"><input type="checkbox" name="consentimiento">
            <span>Autorizo a MaxiCredit a contactarme respecto de mi solicitud.</span></label>
          <span class="err"></span>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" style="margin-top:20px;width:100%;justify-content:center">Enviar solicitud</button>
      <div class="form-msg" id="form-msg"></div>
    </form>
  </div></section>

  <div data-footer></div>

  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/form.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="js/motion.js"></script>
</body>
</html>
