<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0e2138">
  <title>Solicitá tu Crédito — MaxiCredit</title>
  <meta name="description" content="Completá el formulario y solicitá tu crédito personal. Respuesta rápida. Zona Norte, GBA.">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <a href="#main" class="skip-link">Saltar al contenido</a>
  <div data-header></div>

  <main id="main">
  <section class="page-head"><div class="container">
    <h1>Completá y te <span class="red">contactamos</span></h1>
    <p>Cargá tus datos y te respondemos a la brevedad.</p>
  </div></section>

  <section class="section"><div class="container" style="max-width:820px">
    <form id="credit-form" class="form-card" novalidate>
      <input type="checkbox" name="botcheck" tabindex="-1" autocomplete="off" aria-hidden="true" style="position:absolute;left:-9999px">

      <div class="form-wrap">
        <label class="field"><span>Nombre y apellido</span>
          <input name="nombre" type="text" autocomplete="name" placeholder="Ej. Juan Pérez…" required>
          <small class="err"></small></label>
        <label class="field"><span>DNI</span>
          <input name="dni" type="text" inputmode="numeric" autocomplete="off" spellcheck="false" placeholder="Ej. 30123456…" required>
          <small class="err"></small></label>
        <label class="field"><span>Fecha de nacimiento</span>
          <input name="nacimiento" type="date" autocomplete="bday" required>
          <small class="err"></small></label>
        <label class="field"><span>Email</span>
          <input name="email" type="email" autocomplete="email" spellcheck="false" placeholder="nombre@email.com…" required>
          <small class="err"></small></label>
        <label class="field"><span>Teléfono / WhatsApp</span>
          <input name="telefono" type="tel" inputmode="tel" autocomplete="tel" placeholder="Ej. 11 2345 6789…" required>
          <small class="err"></small></label>
        <label class="field"><span>Zona</span>
          <select name="zona" autocomplete="off" required>
            <option value="">Elegí…</option>
            <option>CABA</option><option>GBA Norte</option><option>GBA Oeste</option><option>GBA Sur</option>
          </select><small class="err"></small></label>
        <label class="field full"><span>Domicilio</span>
          <input name="domicilio" type="text" autocomplete="street-address" placeholder="Calle y número…" required>
          <small class="err"></small></label>
        <label class="field"><span>Situación laboral</span>
          <select name="laboral" autocomplete="off" required>
            <option value="">Elegí…</option>
            <option>Solo DNI</option>
            <option>Recibo de sueldo</option>
            <option>Empleado doméstico</option>
            <option>Pensionado/Jubilado</option>
            <option>Monotributista</option>
            <option>Autónomo</option>
            <option>Otro</option>
          </select><small class="err"></small></label>
        <label class="field"><span>Monto solicitado</span>
          <input name="monto" type="number" inputmode="numeric" autocomplete="off" min="0" placeholder="Ej. 150000…" required>
          <small class="err"></small></label>
        <label class="field"><span>Cantidad de cuotas</span>
          <select name="cuotas" autocomplete="off" required>
            <option value="">Elegí…</option>
            <option>3</option><option>6</option><option>9</option><option>12</option><option>18</option><option>24</option>
          </select><small class="err"></small></label>
        <label class="field full"><span>Mensaje (opcional)</span>
          <textarea name="mensaje" rows="3" placeholder="Contanos en qué te ayudamos…"></textarea></label>
        <div class="field full">
          <label class="check"><input type="checkbox" name="consentimiento">
            <span>Autorizo a MaxiCredit a contactarme respecto de mi solicitud.</span></label>
          <small class="err"></small>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" style="margin-top:22px;width:100%">Enviar solicitud</button>
      <div class="form-msg" id="form-msg" role="status" aria-live="polite"></div>
    </form>
  </div></section>
  </main>

  <div data-footer></div>

  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/form.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" defer></script>
  <script src="js/motion.js" defer></script>
</body>
</html>
