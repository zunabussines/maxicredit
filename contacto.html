<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contacto — MaxiCredit</title>
  <meta name="description" content="Contactate con MaxiCredit por email o WhatsApp. Atención personalizada.">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div data-header></div>

  <section class="page-head"><div class="container">
    <h1>Estamos para <span class="red">ayudarte</span></h1>
    <p>Escribinos por el medio que prefieras. Te respondemos rápido.</p>
  </div></section>

  <section class="section" style="padding-top:30px"><div class="container">
    <div class="contact-cards">
      <a class="contact-card" id="card-wa" target="_blank" rel="noopener"><div class="ico"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M.057 24l1.687-6.163a11.867 11.867 0 0 1-1.587-5.946C.16 5.335 5.495 0 12.05 0a11.82 11.82 0 0 1 8.413 3.488 11.82 11.82 0 0 1 3.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 0 1-5.688-1.448L.057 24zM6.6 20.013c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884a9.86 9.86 0 0 0 1.51 5.26l-.999 3.648 3.978-.607zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.247-.694.247-1.289.173-1.413z"/></svg></div><h3>WhatsApp</h3><p id="wa-text"></p></a>
      <a class="contact-card" id="card-mail"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 6L2 7"/></svg></div><h3>Email</h3><p id="mail-text"></p></a>
      <div class="contact-card"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="3"/></svg></div><h3>Dirección</h3><p id="addr-text"></p></div>
    </div>

    <div style="margin-top:30px;border-radius:var(--radio);overflow:hidden;border:1px solid var(--linea)">
      <iframe title="Mapa MaxiCredit" width="100%" height="360" style="border:0;display:block"
        loading="lazy" referrerpolicy="no-referrer-when-downgrade"
        src="https://www.google.com/maps?q=Entre%20R%C3%ADos%20267%2C%20Venado%20Tuerto%2C%20Santa%20Fe&output=embed"></iframe>
    </div>
  </div></section>

  <div data-footer></div>

  <script type="module" src="js/main.js"></script>
  <script type="module">
    import { CONFIG } from "./js/config.js";
    const c = CONFIG.contact;
    document.getElementById("card-wa").href = `https://wa.me/${c.whatsapp}`;
    document.getElementById("wa-text").textContent = c.whatsappDisplay;
    const mail = document.getElementById("card-mail");
    mail.href = `mailto:${c.email}`;
    document.getElementById("mail-text").textContent = c.email;
    document.getElementById("addr-text").textContent = c.address;
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="js/motion.js"></script>
</body>
</html>
